name: Build MegaSelfCodeLoader
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Restore NuGet packages (packages already vendored in repo, this is a safety net)
        run: nuget restore MegaSelfCode1.21.4/MegaSelfCodeLoader.slnx
        continue-on-error: true
      - name: Build (Release x64)
        run: >
          msbuild MegaSelfCode1.21.4/MegaSelfCodeLoader.slnx
          /p:Configuration=Release
          /p:Platform=x64
          /p:PlatformToolset=v143
          /m
      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: MegaSelfCodeLoader
          path: MegaSelfCode1.21.4/x64/Release/
